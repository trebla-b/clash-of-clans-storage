services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coc
      POSTGRES_USER: coc
      POSTGRES_PASSWORD: coc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_CONFIG: /app/config/config.yml
      TZ: Europe/Paris
    volumes:
      - ./config:/app/config:ro

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_CONFIG: /app/config/config.yml
      PORT: 8120
      TZ: Europe/Paris
    ports:
      - "8120:8120"
    volumes:
      - ./config:/app/config:ro

volumes:
  db_data:

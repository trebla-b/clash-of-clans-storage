services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coc
      POSTGRES_USER: coc
      POSTGRES_PASSWORD: coc
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_CONFIG: /app/config/config.yml
      TZ: Europe/Paris
    volumes:
      - ./config:/app/config:ro

  dashboard-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_CONFIG: /app/config/config.yml
      PORT: 8121
      TZ: Europe/Paris
    volumes:
      - ./config:/app/config:ro

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - dashboard-api
    ports:
      - "8120:8120"
    environment:
      TZ: Europe/Paris

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: Europe/Paris
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: coc
      POSTGRES_USER: coc
      PGPASSWORD: coc
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${DB_BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_RETENTION_COUNT: ${DB_BACKUP_RETENTION_COUNT:-28}
    volumes:
      - ./backups:/backups
      - ./docker/db-backup.sh:/db-backup.sh:ro
    entrypoint: ["/bin/sh", "/db-backup.sh"]

volumes:
  db_data:
